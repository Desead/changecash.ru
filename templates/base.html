{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ site_setup.seo_title|default:"Обменник" }}</title>
    <meta name="description" content="{{ site_setup.seo_description }}">
    <meta name="keywords" content="{{ site_setup.seo_keywords }}">
    <meta name="robots" content="index, follow">

    <link rel="icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:locale" content="ru_RU">
    <meta property="og:title" content="{{ site_setup.seo_title|default:site_setup.name }}">
    <meta property="og:description"
          content="{{ site_setup.seo_description|default:'Обмен криптовалюты быстро и безопасно.' }}">
    <meta property="og:image" content="
            {% if site_setup.logo %}{{ site_setup.logo.url }}{% else %}{% static 'images/og-image.png' %}{% endif %}">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    <meta property="og:site_name" content="{{ site_setup.name|default:'Обменник' }}">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ site_setup.seo_title|default:site_setup.name }}">
    <meta name="twitter:description"
          content="{{ site_setup.seo_description|default:'Обмен криптовалюты быстро и безопасно.' }}">
    <meta name="twitter:image" content="
            {% if site_setup.logo %}{{ site_setup.logo.url }}{% else %}{% static 'images/og-image.png' %}{% endif %}">


    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    {{ site_setup.code_to_head|safe }}
</head>

<body class="bg-light text-dark">
{% include "header.html" %}

<main class="container py-4">
    {% block content %}{% endblock %}
</main>

{% include "footer.html" %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


{% block scripts %}{% endblock %}
</body>
</html>

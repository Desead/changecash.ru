{% extends 'base.html' %}

{% block content %}
    <div class="container py-4">
        <h1 class="mb-4 text-center">{{ document.get_doc_type_display }}</h1>

        <div class="document-box">
            {{ document.content|safe }}
            {% if document.doc_type == 'support' %}
                <hr class="my-4">
                {% include 'app_main/templates/app_main/_contacts.html' %}
            {% endif %}
        </div>
    </div>
{% endblock %}
